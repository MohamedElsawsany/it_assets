{% load i18n %}
{% get_current_language as LANG %}
<header class="app-navbar" id="appNavbar">

  <div class="navbar-start">
    <!-- Sidebar toggle (mobile) -->
    <button class="navbar-toggle-btn" id="sidebarToggleBtn" onclick="toggleSidebar()" aria-label="{% trans 'Toggle sidebar' %}">
      <i class="bi bi-list"></i>
    </button>

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="d-none d-sm-block">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item">
          <a href="{% url 'dashboard' %}">
            <i class="bi bi-house" style="font-size:.8rem;"></i>
          </a>
        </li>
        {% block breadcrumb %}{% endblock %}
      </ol>
    </nav>
  </div>

  <div class="navbar-end">

    <!-- Language switcher -->
    <div class="dropdown">
      <button class="lang-btn dropdown-toggle"
              type="button" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-globe2" style="font-size:.85rem;"></i>
        <span class="d-none d-sm-inline">
          {% if LANG == 'ar' %}العربية{% else %}English{% endif %}
        </span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end shadow-sm" style="min-width:140px;font-size:.82rem;">
        <form action="{% url 'set_language' %}" method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ request.path }}">
          <li>
            <button type="submit" name="language" value="en"
                    class="dropdown-item d-flex align-items-center gap-2 {% if LANG == 'en' %}active{% endif %}">
              {% if LANG == 'en' %}<i class="bi bi-check2"></i>{% else %}<span style="width:16px;display:inline-block;"></span>{% endif %}
              English
            </button>
          </li>
          <li>
            <button type="submit" name="language" value="ar"
                    class="dropdown-item d-flex align-items-center gap-2 {% if LANG == 'ar' %}active{% endif %}">
              {% if LANG == 'ar' %}<i class="bi bi-check2"></i>{% else %}<span style="width:16px;display:inline-block;"></span>{% endif %}
              العربية
            </button>
          </li>
        </form>
      </ul>
    </div>

    <div class="navbar-divider d-none d-sm-block"></div>

    <!-- User dropdown -->
    <div class="dropdown">
      <button class="user-menu-btn dropdown-toggle"
              type="button" data-bs-toggle="dropdown" aria-expanded="false">
        <div class="user-avatar">
          {{ request.user.first_name|first|upper }}{{ request.user.last_name|first|upper }}
        </div>
        <div class="d-none d-md-block text-start" style="line-height:1.2;">
          <div class="user-name">{{ request.user.full_name }}</div>
          <div class="user-role" style="margin-top:1px;">
            <span class="badge bg-{{ rbac.role_color }} badge-sm">{{ rbac.role_display }}</span>
          </div>
        </div>
        <i class="bi bi-chevron-down d-none d-md-inline" style="font-size:.65rem;color:var(--text-muted);"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end shadow" style="min-width:210px;font-size:.82rem;border-radius:12px;border-color:var(--border-color);">
        <li>
          <div class="px-3 py-2 d-flex align-items-center gap-2">
            <div class="user-avatar" style="width:36px;height:36px;font-size:.75rem;">
              {{ request.user.first_name|first|upper }}{{ request.user.last_name|first|upper }}
            </div>
            <div style="min-width:0;">
              <div class="fw-semibold text-truncate" style="font-size:.84rem;color:var(--text-primary);">{{ request.user.full_name }}</div>
              <div class="text-truncate" style="font-size:.73rem;color:var(--text-muted);">{{ request.user.email }}</div>
            </div>
          </div>
        </li>
        <li><hr class="dropdown-divider my-1" style="border-color:var(--border-color-light);"></li>
        <li>
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="dropdown-item d-flex align-items-center gap-2 py-2" style="color:var(--text-secondary);">
              <i class="bi bi-box-arrow-right text-danger" style="font-size:.9rem;"></i>
              {% trans "Sign out" %}
            </button>
          </form>
        </li>
      </ul>
    </div>

  </div>
</header>
