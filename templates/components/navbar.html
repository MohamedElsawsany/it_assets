{% load i18n %}
<header class="app-navbar" id="appNavbar">

  <div class="navbar-start">
    <!-- Sidebar toggle -->
    <button class="navbar-toggle-btn" id="sidebarToggleBtn" onclick="toggleSidebar()" aria-label="{% trans 'Toggle sidebar' %}">
      <i class="bi bi-list"></i>
    </button>
    <!-- Page breadcrumb / title -->
    <nav aria-label="breadcrumb" class="d-none d-md-block">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">{% trans "Home" %}</a></li>
        {% block breadcrumb %}{% endblock %}
      </ol>
    </nav>
  </div>

  <div class="navbar-end">

    <!-- Language switcher -->
    <div class="dropdown me-2">
      <button class="btn btn-sm btn-outline-secondary dropdown-toggle d-flex align-items-center gap-1"
              type="button" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-translate"></i>
        <span class="d-none d-sm-inline">
          {% get_current_language as LANG %}
          {% if LANG == 'ar' %}العربية{% else %}English{% endif %}
        </span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <form action="{% url 'set_language' %}" method="post" id="langForm">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ request.path }}">
          <li>
            <button type="submit" name="language" value="en"
                    class="dropdown-item {% if LANG == 'en' %}active{% endif %}">
              <i class="bi bi-check2 me-1 {% if LANG != 'en' %}invisible{% endif %}"></i>
              English
            </button>
          </li>
          <li>
            <button type="submit" name="language" value="ar"
                    class="dropdown-item {% if LANG == 'ar' %}active{% endif %}">
              <i class="bi bi-check2 me-1 {% if LANG != 'ar' %}invisible{% endif %}"></i>
              العربية
            </button>
          </li>
        </form>
      </ul>
    </div>

    <!-- User dropdown -->
    <div class="dropdown">
      <button class="btn btn-sm d-flex align-items-center gap-2 user-menu-btn"
              type="button" data-bs-toggle="dropdown" aria-expanded="false">
        <div class="user-avatar">
          {{ request.user.first_name|first|upper }}{{ request.user.last_name|first|upper }}
        </div>
        <div class="d-none d-md-block text-start">
          <div class="user-name">{{ request.user.full_name }}</div>
          <div class="user-role">
            <span class="badge bg-{{ rbac.role_color }} badge-sm">{{ rbac.role_display }}</span>
          </div>
        </div>
        <i class="bi bi-chevron-down small ms-1"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end shadow-sm">
        <li>
          <div class="dropdown-header d-flex align-items-center gap-2 py-2">
            <div class="user-avatar user-avatar-sm">
              {{ request.user.first_name|first|upper }}{{ request.user.last_name|first|upper }}
            </div>
            <div>
              <div class="fw-semibold small">{{ request.user.full_name }}</div>
              <div class="text-muted" style="font-size:.75rem">{{ request.user.email }}</div>
            </div>
          </div>
        </li>
        <li><hr class="dropdown-divider my-1"></li>
        <li>
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="dropdown-item d-flex align-items-center gap-2">
              <i class="bi bi-box-arrow-right text-danger"></i>
              {% trans "Logout" %}
            </button>
          </form>
        </li>
      </ul>
    </div>

  </div>
</header>
